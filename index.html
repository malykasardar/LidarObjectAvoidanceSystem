<html>
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>commabody</title>
    <link rel="stylesheet" href="/static/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/css/bootstrap.min.css" integrity="sha512-SbiR/eusphKoMVVXysTKG/7VseWii+Y3FdHrt0EpKgpToZeemhqHeZeLWLhJutz/2ut2Vw1uQEj2MbRF+TVBUA==" crossorigin="anonymous" referrerpolicy="no-referrer" /><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js" integrity="sha512-1/RvZTcCDEUjY/CypiMz+iqqtaoQfAITmNSJY17Myp4Ms5mdxPS5UV7iOfdZoxcGhzFbOm6sntTKJppjvuhg4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@^1"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <div id="main">
      <p class="jumbo">comma body</p>
      <audio id="audio" autoplay="true"></audio>
      <video id="video" playsinline autoplay muted loop poster="/static/poster.png" style="display:none;"></video>
      <img id="overlay-feed" src="/video_feed" style="width:100%; max-width:640px; border-radius:8px; border:2px solid #333; background:#000;" alt="Openpilot Overlay Feed" />
      <div id="icon-panel" class="row">
        <div class="col-sm-12 col-md-6 details">
          <div class="icon-sup-panel col-12">
            <div class="icon-sub-panel">
              <div class="icon-sub-sub-panel">
                <i class="bi bi-speaker-fill pre-blob"></i>
                <i class="bi bi-mic-fill pre-blob"></i>
                <i class="bi bi-camera-video-fill pre-blob"></i>
              </div>
              <p class="small">body</p>
            </div>
            <div class="icon-sub-panel">
              <div class="icon-sub-sub-panel">
                <i class="bi bi-speaker-fill pre-blob"></i>
                <i class="bi bi-mic-fill pre-blob"></i>
              </div>
              <p class="small">you</p>
            </div>
          </div>
        </div>
        <div class="col-sm-12 col-md-6 details">
          <div class="icon-sup-panel col-12">
            <div class="icon-sub-panel">
              <div class="icon-sub-sub-panel">
                <i id="ping-time" class="pre-blob1">-</i>
              </div>
              <p class="bi bi-arrow-repeat small"> ping time</p>
            </div>
            <div class="icon-sub-panel">
              <div class="icon-sub-sub-panel">
                <i id="battery" class="pre-blob1">-</i>
              </div>
              <p class="bi bi-battery-half small"> battery</p>
            </div>
          </div>
        </div>
        <div class="icon-sub-panel" style="text-align: center; padding: 10px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <div>
                <button type="button" id="engage-btn" class="btn btn-outline-danger btn-lg"
                        style="font-size: 24px; padding: 15px 40px; min-width: 200px; font-weight: bold; transition: all 0.3s;">
                    ENGAGE
                </button>
                <p class="small" id="engage-status" style="margin-top: 5px; font-size: 14px;">DISENGAGED</p>
            </div>
            <div>
                <button type="button" id="autopilot-btn" class="btn btn-outline-info btn-lg"
                        style="font-size: 24px; padding: 15px 40px; min-width: 200px; font-weight: bold; transition: all 0.3s;">
                    AUTOPILOT
                </button>
                <p class="small" id="autopilot-status" style="margin-top: 5px; font-size: 14px;">OFF</p>
            </div>
            <div>
                <button type="button" id="exp-auto-btn" class="btn btn-outline-warning btn-lg"
                        style="font-size: 24px; padding: 15px 40px; min-width: 200px; font-weight: bold; transition: all 0.3s;">
                    EXP AUTO
                </button>
                <p class="small" id="exp-auto-status" style="margin-top: 5px; font-size: 14px;">OFF</p>
            </div>
            <div>
                <button type="button" id="lane-follow-btn" class="btn btn-outline-success btn-lg"
                        style="font-size: 24px; padding: 15px 40px; min-width: 200px; font-weight: bold; transition: all 0.3s;">
                    LANE FOLLOW
                </button>
                <p class="small" id="lane-follow-status" style="margin-top: 5px; font-size: 14px;">OFF</p>
            </div>
            </div>
      </div>
      <div class="row" style="width: 100%; padding: 0px 10px 0px 10px;">
        <div id="wasd" class="col-md-12 row">
          <div class="col-md-6 col-sm-12" style="justify-content: center; display: flex; flex-direction: column;">
            <div class="wasd-row">
              <div class="keys" id="key-w">W</div>
              <div id="key-val"><span id="pos-vals">0,0</span><span>x,y</span></div>
            </div>
            <div class="wasd-row">
              <div class="keys" id="key-a">A</div>
              <div class="keys" id="key-s">S</div>
              <div class="keys" id="key-d">D</div>
            </div>
          </div>
          <div class="col-md-6 col-sm-12 form-group plan-form">
            <label style="font-weight:bold; font-size:15px;">GPS Navigation</label>
            <div id="gps-status" style="font-size:12px; color:#aaa; margin-bottom:6px;">Waiting for fix...</div>
            <div id="map" style="height:220px; min-height:220px; width:100%; border-radius:8px; border:2px solid #444; margin-bottom:8px; background:#1a1a2e; display:block;"></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <input type="text" id="wp-name" class="form-control" placeholder="Waypoint name" style="flex:1; min-width:120px;"/>
              <button type="button" id="save-wp-btn" class="btn btn-outline-success btn-sm">Save Waypoint</button>
            </div>
            <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
              <select id="wp-select" class="form-control" style="flex:1;"><option value="">Select waypoint...</option></select>
              <button type="button" id="summon-btn" class="btn btn-outline-warning btn-sm">Summon</button>
            </div>
          </div>
        </div>
      </div>
      <div class="row" style="padding: 0px 10px 0px 10px; width: 100%;">
        <div class="panel row">
          <div class="col-sm-3" style="text-align: center;">
            <p>Play Sounds</p>
          </div>
          <div class="btn-group col-sm-8">
            <button type="button" id="sound-engage" class="btn btn-outline-success btn-lg sound">Engage</button>
            <button type="button" id="sound-disengage" class="btn btn-outline-warning btn-lg sound">Disengage</button>
            <button type="button" id="sound-error" class="btn btn-outline-danger btn-lg sound">Error</button>
          </div>
        </div>
      </div>
      <div class="row" style="padding: 0px 10px 0px 10px; width: 100%;">
        <div class="panel row">
          <div class="col-sm-6"><canvas id="chart-ping"></canvas></div>
          <div class="col-sm-6"><canvas id="chart-battery"></canvas></div>
        </div>
      </div>
      <div class="row" style="padding: 0px 10px 20px 10px; width: 100%;">
        <div class="panel" style="padding: 12px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <p style="margin: 0; font-weight: bold; font-size: 14px;">Actuator Log</p>
            <div>
              <button type="button" id="log-pause-btn" class="btn btn-outline-secondary btn-sm" style="font-size: 11px;">Pause</button>
              <button type="button" id="log-clear-btn" class="btn btn-outline-secondary btn-sm" style="font-size: 11px;">Clear</button>
            </div>
          </div>
          <div id="actuator-log" style="
            height: 220px;
            overflow-y: auto;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #0f0;
            line-height: 1.5;
          "></div>
        </div>
      </div>
    </div>
    <script src="/static/js/jsmain.js" type="module"></script>
    <script>
    let map = null, scooterMarker = null, wpMarkers = [];

    function initMap(lat, lon) {
      if (map) return;
      map = L.map('map').setView([lat, lon], 18);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OpenStreetMap'
      }).addTo(map);
      scooterMarker = L.marker([lat, lon]).addTo(map).bindPopup('AutoScoot');
      map.on('click', function(e) {
        var clat = e.latlng.lat.toFixed(6);
        var clon = e.latlng.lng.toFixed(6);
        if (window.clickMarker) map.removeLayer(window.clickMarker);
        window.clickMarker = L.marker([clat, clon]).addTo(map).bindPopup('Destination').openPopup();
        window._clickedGoal = {name: 'Destination', lat: parseFloat(clat), lon: parseFloat(clon), alt: 0};
        document.getElementById('gps-status').innerHTML = '<span style="color:#ff0">Goal set: ' + clat + ', ' + clon + '</span>';
      });
    }

    function pollGPS() {
      fetch('/gps').then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === 0 && d.lat && !isNaN(d.lat)) {
          document.getElementById('gps-status').innerHTML = '<span style="color:#0f0">Fix: ' + d.lat.toFixed(6) + ', ' + d.lon.toFixed(6) + '</span>';
          initMap(d.lat, d.lon);
          if (scooterMarker) scooterMarker.setLatLng([d.lat, d.lon]);
        } else {
          document.getElementById('gps-status').innerHTML = '<span style="color:#f90">No fix yet...</span>';
        }
      }).catch(function(e) { console.log('GPS poll error:', e); });
    }

    function loadWaypoints() {
      fetch('/waypoints').then(function(r) { return r.json(); }).then(function(wps) {
        var sel = document.getElementById('wp-select');
        sel.innerHTML = '<option value="">Select waypoint...</option>';
        wps.forEach(function(wp, i) {
          sel.innerHTML += '<option value="' + i + '">' + wp.name + '</option>';
        });
        wpMarkers.forEach(function(m) { if (map) map.removeLayer(m); });
        wpMarkers = [];
        if (map) {
          wps.forEach(function(wp) {
            var m = L.marker([wp.lat, wp.lon]).addTo(map).bindPopup(wp.name);
            wpMarkers.push(m);
          });
        }
      }).catch(function(e) { console.log('Waypoints error:', e); });
    }

    document.addEventListener('DOMContentLoaded', function() {
      pollGPS();
      setInterval(pollGPS, 1000);
      setInterval(loadWaypoints, 5000);

      document.getElementById('save-wp-btn').addEventListener('click', function() {
        var name = document.getElementById('wp-name').value.trim();
        if (!name) { alert('Enter a waypoint name'); return; }
        fetch('/gps').then(function(r) { return r.json(); }).then(function(d) {
          if (d.status !== 0 || !d.lat) { alert('No GPS fix yet!'); return; }
          fetch('/waypoints', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, lat: d.lat, lon: d.lon, alt: d.alt})
          }).then(function() {
            document.getElementById('wp-name').value = '';
            loadWaypoints();
            alert('Waypoint saved: ' + name);
          });
        });
      });

      document.getElementById('summon-btn').addEventListener('click', function() {
        var goal = null;
        if (window._clickedGoal) {
          goal = window._clickedGoal;
        } else {
          var sel = document.getElementById('wp-select');
          if (!sel.value) { alert('Click a destination on the map or select a saved waypoint'); return; }
          fetch('/waypoints').then(function(r) { return r.json(); }).then(function(wps) {
            goal = wps[parseInt(sel.value)];
            fetch('/summon', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(goal)
            }).then(function() { alert('Summoning to: ' + goal.name); });
          });
          return;
        }
        fetch('/summon', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(goal)
        }).then(function() { alert('Summoning to: ' + goal.name); });
      });
    });
    </script>
  </body>
</html>
